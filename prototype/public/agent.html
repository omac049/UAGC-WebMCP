<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebMCP Agent Demo · Demo University</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .agent-shell {
        max-width: none;
        margin: 0;
        padding: 0;
        width: 100%;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .agent-header {
        background: #1a365d;
        color: #e2e8f0;
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      }

      .agent-header h1 {
        color: #fff;
        margin: 0 0 0.35rem;
        font-size: clamp(1.35rem, 3vw, 1.75rem);
      }

      .agent-header p {
        margin: 0;
        color: #cbd5e0;
        font-size: 0.98rem;
      }

      .agent-header a {
        color: #fff;
        text-decoration: underline;
        text-underline-offset: 0.15em;
      }

      .agent-header a:hover {
        color: #fefcbf;
      }

      .agent-header__links {
        margin-top: 0.65rem;
        font-size: 0.92rem;
      }

      .agent-layout {
        display: flex;
        flex: 1;
        min-height: 0;
        width: 100%;
      }

      .agent-chat-pane {
        flex: 0 0 60%;
        max-width: 60%;
        border-right: 1px solid #e2e8f0;
        display: flex;
        flex-direction: column;
        background: #fff;
        min-height: 0;
      }

      .agent-inspector-pane {
        flex: 0 0 40%;
        max-width: 40%;
        display: flex;
        flex-direction: column;
        background: #f7fafc;
        min-height: 0;
      }

      .pane-title {
        padding: 0.75rem 1rem;
        font-weight: 700;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #2d3748;
        border-bottom: 1px solid #e2e8f0;
        background: #edf2f7;
      }

      .chat-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 1rem 1rem 0.5rem;
        min-height: 0;
      }

      .chat-log {
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
      }

      .chat-row {
        display: flex;
      }

      .chat-row--user {
        justify-content: flex-end;
      }

      .chat-row--agent {
        justify-content: flex-start;
      }

      .chat-bubble {
        max-width: min(36rem, 92%);
        border-radius: 1rem;
        padding: 0.65rem 0.85rem;
        font-size: 0.95rem;
        line-height: 1.55;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
      }

      .chat-bubble p:last-child,
      .chat-bubble ul:last-child,
      .chat-bubble ol:last-child {
        margin-bottom: 0;
      }

      .chat-bubble--user {
        background: #1a365d;
        color: #f7fafc;
        border-bottom-right-radius: 0.25rem;
      }

      .chat-bubble--user a {
        color: #fefcbf;
      }

      .chat-bubble--agent {
        background: #edf2f7;
        color: #1a202c;
        border-bottom-left-radius: 0.25rem;
      }

      .chat-bubble code {
        font-size: 0.88em;
        padding: 0.1em 0.35em;
        border-radius: 0.35rem;
        background: rgba(0, 0, 0, 0.06);
      }

      .chat-bubble--user code {
        background: rgba(255, 255, 255, 0.12);
      }

      .chat-bubble .muted {
        color: #718096;
        font-size: 0.9em;
      }

      .chat-bubble--user .muted {
        color: #cbd5e0;
      }

      .agent-list {
        margin: 0.35rem 0 0;
        padding-left: 1.2rem;
      }

      .agent-steps {
        margin: 0.35rem 0 0;
        padding-left: 1.2rem;
      }

      .chat-composer {
        display: flex;
        gap: 0.5rem;
        padding: 0.65rem 1rem 1rem;
        border-top: 1px solid #e2e8f0;
        background: #fff;
      }

      .chat-composer input {
        flex: 1;
        border-radius: 0.65rem;
        border: 1px solid #cbd5e0;
        padding: 0.55rem 0.75rem;
        font: inherit;
      }

      .chat-composer button {
        border: none;
        border-radius: 0.65rem;
        padding: 0.55rem 1rem;
        font-weight: 600;
        cursor: pointer;
        background: #1a365d;
        color: #fff;
      }

      .chat-composer button:hover {
        background: #2c5282;
      }

      .typing-row {
        padding: 0 1rem 0.35rem;
      }

      .typing-bubble {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        background: #edf2f7;
        border-radius: 999px;
        padding: 0.45rem 0.85rem;
        font-size: 0.85rem;
        color: #4a5568;
      }

      .typing-dot {
        width: 0.4rem;
        height: 0.4rem;
        border-radius: 999px;
        background: #718096;
        animation: agent-typing 1.05s infinite ease-in-out both;
      }

      .typing-dot:nth-child(2) {
        animation-delay: 0.15s;
      }

      .typing-dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes agent-typing {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.35;
        }
        40% {
          transform: translateY(-0.25rem);
          opacity: 1;
        }
      }

      .inspector-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 0.75rem;
        min-height: 0;
      }

      .inspector-log {
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
      }

      .inspector-card {
        background: #fff;
        border-radius: 0.65rem;
        padding: 0.75rem 0.85rem;
        border: 2px solid #22c55e;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      }

      .inspector-card--err {
        border-color: #e53e3e;
      }

      .inspector-card__head {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem 0.75rem;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 0.5rem;
      }

      .inspector-card__name {
        font-weight: 700;
        color: #1a365d;
      }

      .inspector-card__meta {
        font-size: 0.8rem;
        color: #718096;
      }

      .inspector-card__block {
        margin-top: 0.45rem;
      }

      .inspector-card__label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #718096;
        margin-bottom: 0.2rem;
      }

      .inspector-card__pre {
        margin: 0;
        font-size: 0.78rem;
        line-height: 1.45;
        background: #f7fafc;
        border: 1px solid #e2e8f0;
        border-radius: 0.45rem;
        padding: 0.45rem 0.55rem;
        max-height: 10rem;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 900px) {
        .agent-layout {
          flex-direction: column;
        }

        .agent-chat-pane,
        .agent-inspector-pane {
          flex: 1 1 auto;
          max-width: none;
          border-right: none;
        }

        .agent-inspector-pane {
          border-top: 1px solid #e2e8f0;
          min-height: 14rem;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/" class="logo">Demo University</a>
      <a href="/programs.html">Programs</a>
      <a href="/admissions.html">Admissions</a>
      <a href="/request-info.html">Request Info</a>
      <a href="/agent.html" class="agent-link">🤖 Agent Demo</a>
    </nav>

    <main class="agent-shell">
      <header class="agent-header">
        <h1>WebMCP Agent Demo</h1>
        <p>Watch AI tools in action</p>
        <div class="agent-header__links">
          <a href="/">Back to home</a>
          ·
          <a href="/programs.html">Program catalog</a>
          ·
          <a href="/request-info.html">Request info form</a>
        </div>
      </header>

      <div class="agent-layout">
        <section class="agent-chat-pane" aria-label="Chat">
          <div class="pane-title">Chat</div>
          <div class="chat-scroll">
            <div id="chat-log" class="chat-log"></div>
            <div id="typing-row" class="typing-row" hidden>
              <div class="typing-bubble" aria-live="polite">
                <span class="typing-dot" aria-hidden="true"></span>
                <span class="typing-dot" aria-hidden="true"></span>
                <span class="typing-dot" aria-hidden="true"></span>
                <span class="sr-only">Agent is typing</span>
              </div>
            </div>
          </div>
          <form id="chat-form" class="chat-composer" autocomplete="on">
            <label class="sr-only" for="chat-input">Message</label>
            <input id="chat-input" name="message" type="text" placeholder="Ask about programs, admissions, aid, or info…" />
            <button type="submit">Send</button>
          </form>
        </section>

        <aside class="agent-inspector-pane" aria-label="Tool inspector">
          <div class="pane-title">Tool Inspector</div>
          <div class="inspector-scroll">
            <div id="inspector-log" class="inspector-log"></div>
          </div>
        </aside>
      </div>
    </main>

    <footer class="site-footer">
      <p style="margin: 0">
        &copy; <span id="y"></span> Demo University. Fictional institution for demonstration purposes.
      </p>
    </footer>

    <script>
      document.getElementById('y').textContent = new Date().getFullYear();
    </script>
    <script src="/js/webmcp-polyfill.js"></script>
    <script src="/js/register-tools.js"></script>
    <script src="/js/demo-agent.js"></script>
  </body>
</html>
